services:
  redis:
    image: redis:alpine
    container_name: finshield-backend-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: finshield-backend
    ports:
      - "5000:5000"
    command: npm start
    env_file:
      - .env
    environment:
      - REDIS_URI=redis://redis:6379
      # localhost inside a container = the container itself, not the host.
      # host.docker.internal resolves to the Windows host where AI_SERVICE is published on port 8000.
      - AI_SERVICE_URL=http://host.docker.internal:8000
    depends_on:
      redis:
        condition: service_healthy
