paths:
  /health:
    get:
      summary: Health check endpoint
      description: Check if the API is running and healthy
      tags:
        - Health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "OK"
