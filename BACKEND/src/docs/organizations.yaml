paths:
  /organization/createOrganization:
    post:
      summary: Create a new organization
      description: Create a new organization with optional invoice template upload (SUPER_ADMIN only)
      tags:
        - Organizations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  description: Organization name
                  example: Acme Corporation
                type:
                  type: string
                  description: Organization type
                  enum: [organization, company]
                  example: company
                status:
                  type: string
                  description: Organization status
                  enum: [active, inactive]
                  example: active
                invoiceTemplate:
                  type: string
                  format: binary
                  description: Optional invoice template file (PDF or DOCX, max 10MB)
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Organization created successfully
                  data:
                    $ref: "#/components/schemas/Organization"
        "400":
          description: Validation error or invalid file type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden - SUPER_ADMIN only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Server error (S3 not configured, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"


  /organization/listOrganizations:
    get:
      summary: List all organizations
      description: Get a paginated list of all organizations (SUPER_ADMIN only). Supports search, sorting, and pagination.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, name, type]
            default: createdAt
          description: Field to sort by
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Organization"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only

  /organization/getOrganization/{id}:
    get:
      summary: Get organization by ID
      description: Get a specific organization by ID. SUPER_ADMIN can access any org, others can only access their own.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Organization ID
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Cannot access this organization
        "404":
          description: Organization not found
