paths:
  /organization/createOrganization:
    post:
      summary: Create a new organization
      description: Create a new organization (SUPER_ADMIN only)
      tags:
        - Organizations
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - type
              properties:
                name:
                  type: string
                  example: Acme Corporation
                type:
                  type: string
                  enum: [COMPANY, AUDITOR, REGULATOR]
                  example: COMPANY
      responses:
        "201":
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Organization"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only

  /organization/listOrganizations:
    get:
      summary: List all organizations
      description: Get a list of all organizations (SUPER_ADMIN only)
      tags:
        - Organizations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only

  /organization/getOrganization/{id}:
    get:
      summary: Get organization by ID
      description: Get a specific organization by ID. SUPER_ADMIN can access any org, others can only access their own.
      tags:
        - Organizations
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Organization ID
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Organization"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Cannot access this organization
        "404":
          description: Organization not found
