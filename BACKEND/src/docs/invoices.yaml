paths:
  /invoice/list:
    get:
      summary: List invoices (paginated)
      description: >
        Retrieve a paginated list of invoices with role-based scoping.
        SUPER_ADMIN and REGULATOR see all invoices (optional orgId filter).
        AUDITOR sees invoices from assigned companies only.
        COMPANY_MANAGER sees all invoices in their organization.
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, invoiceNumber, invoiceDate, totalAmount, reviewDecision]
            default: createdAt
          description: Sort field
        - in: query
          name: orgId
          schema:
            type: string
          description: Filter by organization ID (SUPER_ADMIN/REGULATOR only)
        - in: query
          name: reviewDecision
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: Filter by review status
      responses:
        "200":
          description: Paginated invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/InvoiceListItem"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /invoice/my-invoices:
    get:
      summary: List my invoices (employee)
      description: >
        Retrieve a paginated list of invoices uploaded by the authenticated COMPANY_USER.
        Returns a simplified payload without AI analysis details.
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, invoiceNumber, invoiceDate, totalAmount, reviewDecision]
            default: createdAt
          description: Sort field
        - in: query
          name: reviewDecision
          schema:
            type: string
            enum: [pending, approved, rejected]
          description: Filter by review status
      responses:
        "200":
          description: Paginated list of user's own invoices
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/MyInvoiceItem"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - COMPANY_USER only

  /invoice/{id}:
    get:
      summary: Get invoice detail
      description: >
        Retrieve full detail for a single invoice with role-based access control.
        SUPER_ADMIN/REGULATOR can view any invoice.
        AUDITOR can view invoices from assigned companies.
        COMPANY_MANAGER can view invoices in their organization.
        COMPANY_USER can view only their own uploaded invoices.
        When the invoice has been anchored on-chain, the IPFS CID is decoded from
        the Ethereum transaction logs and a viewable file URL is generated
        (Google Docs Viewer for DOCX, direct Pinata gateway for PDF).
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[0-9a-fA-F]{24}$"
          description: Invoice MongoDB ObjectId
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/InvoiceDetail"
        "400":
          description: Invalid invoice ID format
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Invoice not found or not authorized
    patch:
      summary: Submit review decision
      description: >
        AUDITOR-only: Submit or update the review decision and notes for an invoice in a single operation.
        The auditor must have an active assignment for the invoice's organization.
        AI analysis must be complete (aiVerdict != null) before a review can be submitted.
        Re-submittable — each call overwrites the previous decision, notes, and refreshes reviewedAt.
        Emits invoice:reviewed via Socket.IO to the uploader, org room, and role:SUPER_ADMIN.
      tags:
        - Invoices
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            pattern: "^[0-9a-fA-F]{24}$"
          description: Invoice MongoDB ObjectId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reviewDecision
                - reviewNotes
              properties:
                reviewDecision:
                  type: string
                  enum: [approved, rejected]
                  description: The auditor's decision
                  example: approved
                reviewNotes:
                  type: string
                  minLength: 1
                  maxLength: 1000
                  description: Notes justifying the decision (required, 1–1000 chars)
                  example: All line items verified and amounts match the purchase order.
      responses:
        "200":
          description: Review submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      invoiceId:
                        type: string
                        example: "507f1f77bcf86cd799439011"
                      reviewDecision:
                        type: string
                        enum: [approved, rejected]
                        example: approved
                      reviewNotes:
                        type: string
                        example: All line items verified and amounts match the purchase order.
                      reviewedAt:
                        type: string
                        format: date-time
                        example: "2026-03-04T10:30:00.000Z"
                      isUpdate:
                        type: boolean
                        description: true if this overwrites a prior decision (logs REVIEW_UPDATED), false for first submission (logs REVIEW_SUBMITTED)
                        example: false
        "400":
          description: Validation error or AI analysis not yet complete (AI_PENDING)
        "401":
          description: Unauthorized
        "404":
          description: Invoice not found or auditor not assigned to this organization

  /invoice/upload:
    post:
      summary: Upload and anchor an invoice
      description: Upload an invoice file, store it on IPFS, and anchor its hash on the blockchain. Only COMPANY_MANAGER and COMPANY_USER can upload invoices.
      tags:
        - Invoices
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Invoice file (PDF, image, or document, max 10MB)
      responses:
        "201":
          description: Invoice uploaded and anchored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Invoice"
        "400":
          description: Invalid file or validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - COMPANY_MANAGER or COMPANY_USER only
        "413":
          description: File too large (max 10MB)
