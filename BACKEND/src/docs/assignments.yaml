paths:
  /assignment/createAssignment:
    post:
      summary: Create a new assignment
      description: Assign an auditor organization to a company organization (SUPER_ADMIN only)
      tags:
        - Assignments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - auditorUserId
                - companyOrgId
              properties:
                auditorUserId:
                  type: string
                  description: ID of the auditor user
                  example: "507f1f77bcf86cd799439011"
                companyOrgId:
                  type: string
                  description: ID of the company organization
                  example: "507f1f77bcf86cd799439012"
      responses:
        "201":
          description: Assignment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Assignment"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only

  /assignment/listAssignments:
    get:
      summary: List all assignments
      description: Get a list of all auditor-company assignments (SUPER_ADMIN only)
      tags:
        - Assignments
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Assignment"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only

  /assignment/{id}:
    get:
      summary: Get assignment by ID
      description: Get a specific assignment by ID (SUPER_ADMIN only)
      tags:
        - Assignments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Assignment ID
      responses:
        "200":
          description: Assignment details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Assignment"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only
        "404":
          description: Assignment not found

  /assignment/updateAssignment/{id}:
    put:
      summary: Update assignment
      description: Update an existing assignment (SUPER_ADMIN only)
      tags:
        - Assignments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Assignment ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, INACTIVE]
                  example: ACTIVE
      responses:
        "200":
          description: Assignment updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Assignment"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only
        "404":
          description: Assignment not found

  /assignment/deleteAssignment/{id}:
    delete:
      summary: Delete assignment
      description: Delete an existing assignment (SUPER_ADMIN only)
      tags:
        - Assignments
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Assignment ID
      responses:
        "200":
          description: Assignment deleted successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - SUPER_ADMIN only
        "404":
          description: Assignment not found
