paths:
  /user/listUsers:
    get:
      summary: List all users
      description: |
        Get a paginated list of users. Current user is excluded from results.
        - SUPER_ADMIN: Can list all users or filter by orgId (query parameter)
        - COMPANY_MANAGER: Can only list users in their own organization

        Supports search (by username or email), sorting, and pagination.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, username, email, role, lastLoginAt]
            default: createdAt
          description: Field to sort by
        - in: query
          name: orgId
          schema:
            type: string
          description: Filter users by organization ID (SUPER_ADMIN only)
          example: "698db6ce38263f5e8f5a8bbc"
      responses:
        "200":
          description: Paginated list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /user/listEmployees:
    get:
      summary: List company employees
      description: |
        Get a paginated list of all employees (COMPANY_USER role) in the manager's organization.
        Only accessible by COMPANY_MANAGER. Excludes the manager themselves.
        Supports search (by username or email), sorting, and pagination.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/SearchParam"
        - $ref: "#/components/parameters/OrderParam"
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [createdAt, username, email]
            default: createdAt
          description: Field to sort by
      responses:
        "200":
          description: Paginated list of employees
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/User"
                      pagination:
                        $ref: "#/components/schemas/Pagination"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - COMPANY_MANAGER only
        "400":
          description: Bad Request - Organization not found for user

  /user/createUser:
    post:
      summary: Create a new user
      description: Create a new user. SUPER_ADMIN can create any role, COMPANY_MANAGER can only create COMPANY_USER.
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                password:
                  type: string
                  format: password
                  example: Password123!
                username:
                  type: string
                  example: Jon Doe
                role:
                  type: string
                  enum: [SUPER_ADMIN, AUDITOR, REGULATOR, COMPANY_MANAGER, COMPANY_USER]
                  example: COMPANY_USER
                orgId:
                  type: string
                  example: "507f1f77bcf86cd799439011"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /user/{id}:
    get:
      summary: Get user by ID
      description: Get a specific user by ID. SUPER_ADMIN can access any user, COMPANY_MANAGER can only access users in their org.
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: User not found

  /user/updateUser/{id}:
    put:
      summary: Update user status
      description: |
        Update user status (enable/disable). 
        - SUPER_ADMIN can update any user
        - COMPANY_MANAGER can only update COMPANY_USER employees in their organization
        - Cannot disable own account
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [active, disabled]
                  example: disabled
                  description: User status to set
                reason:
                  type: string
                  example: "Employee left the company"
                  description: Required when status is 'disabled'
            examples:
              disable:
                summary: Disable user
                value:
                  status: disabled
                  reason: "Employee left the company"
              enable:
                summary: Enable user
                value:
                  status: active
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
              example:
                ok: true
                data:
                  id: "698db123..."
                  orgId: "698db6ce38263f5e8f5a8bbc"
                  role: "COMPANY_USER"
                  email: "employee@company.com"
                  username: "employee1"
                  status: "disabled"
                  disabledByUserId: "698db6e4..."
                  disabledAt: "2026-02-16T10:30:00.000Z"
                  disableReason: "Employee left the company"
                  mfaEnabled: false
                  createdAt: "2026-02-10T10:00:00.000Z"
                  updatedAt: "2026-02-16T10:30:00.000Z"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      code:
                        type: string
              examples:
                cannotDisableSelf:
                  summary: Cannot disable own account
                  value:
                    ok: false
                    error:
                      message: "You cannot disable your own account"
                      code: "CANNOT_DISABLE_SELF"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      code:
                        type: string
              examples:
                forbiddenRole:
                  summary: Cannot update this role
                  value:
                    ok: false
                    error:
                      message: "Company managers can only update employee accounts"
                      code: "FORBIDDEN_ROLE"
                forbiddenOrg:
                  summary: Cannot update other organization's users
                  value:
                    ok: false
                    error:
                      message: "You can only update employees in your organization"
                      code: "FORBIDDEN_ORG"
        "404":
          description: User not found
